---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zwave-js-ui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      zwavejs:
        containers:
          app:
            image:
              repository: ghcr.io/zwave-js/zwave-js-ui
              tag: 11.15.1

            resources:
              requests:
                memory: 100M
                cpu: 30m
              limits:
                memory: 512M

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &httpPort 8091
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    service:
      app:
        ports:
          http:
            port: *httpPort
          websocket:
            port: 3000

    route:
      app:
        annotations:
          dashboard.home/enabled: "true"
          dashboard.home/name: Z-Wave JS
          dashboard.home/description: Control your Z-wave devices
          dashboard.home/icon: z-wave-js-ui
          dashboard.home/group: Home Automation
        hostnames: ["zwavejs.hemma.dev"]
        parentRefs:
          - name: internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    persistence:
      config:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /usr/src/app/store
