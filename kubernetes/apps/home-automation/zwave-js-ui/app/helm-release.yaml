---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zwave-js-ui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      zwavejs:
        containers:
          app:
            image:
              repository: ghcr.io/zwave-js/zwave-js-ui
              tag: 11.16.1

            resources:
              requests:
                memory: 100M
                cpu: 30m
              limits:
                memory: 512M

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - |
                        const ws = new (require('ws'))('ws://localhost:3000');
                        ws.on('message', d => {
                          const msg = JSON.parse(d.toString());
                          if (msg.type === 'version' && msg.homeId) { ws.close(); process.exit(0); }
                          else { process.exit(1); }
                        });
                        ws.on('error', () => process.exit(1));
                        setTimeout(() => process.exit(1), 5000);
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - |
                        const ws = new (require('ws'))('ws://localhost:3000');
                        ws.on('message', d => {
                          const msg = JSON.parse(d.toString());
                          if (msg.type === 'version' && msg.homeId) { ws.close(); process.exit(0); }
                          else { process.exit(1); }
                        });
                        ws.on('error', () => process.exit(1));
                        setTimeout(() => process.exit(1), 5000);
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - node
                      - -e
                      - |
                        const ws = new (require('ws'))('ws://localhost:3000');
                        ws.on('message', d => {
                          const msg = JSON.parse(d.toString());
                          if (msg.type === 'version' && msg.homeId) { ws.close(); process.exit(0); }
                          else { process.exit(1); }
                        });
                        ws.on('error', () => process.exit(1));
                        setTimeout(() => process.exit(1), 5000);
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30

    service:
      app:
        ports:
          http:
            port: &httpPort 8091
          websocket:
            port: 3000

    route:
      app:
        annotations:
          dashboard.home/enabled: "true"
          dashboard.home/name: Z-Wave JS
          dashboard.home/description: Control your Z-wave devices
          dashboard.home/icon: z-wave-js-ui
          dashboard.home/group: Home Automation
        hostnames: ["zwavejs.hemma.dev"]
        parentRefs:
          - name: internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    persistence:
      config:
        existingClaim: "${VOLSYNC_CLAIM}"
        globalMounts:
          - path: /usr/src/app/store
