---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: evcc
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      evcc:
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: evcc/evcc
              tag: 0.305.1

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            resources:
              requests:
                cpu: 100m
                memory: 500M
              limits:
                memory: 1000M

    service:
      app:
        ports:
          http:
            port: &port 7070
          tcp8887:
            enabled: true
            port: 8887
          udp7090:
            enabled: true
            port: 7090
            protocol: UDP
          udp9522:
            enabled: true
            port: 9522
            protocol: UDP

    route:
      app:
        annotations:
          dashboard.home/enabled: "true"
          dashboard.home/name: Evcc
          dashboard.home/description: Control EV charging
          dashboard.home/icon: evcc
          dashboard.home/group: Home Automation
        hostnames: ["{{ .Release.Name }}.hemma.dev"]
        parentRefs:
          - name: internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config-file:
        type: secret
        name: evcc-config
        globalMounts:
          - path: /etc/evcc.yaml
            subPath: evcc.yaml

      config:
        existingClaim: "${VOLSYNC_CLAIM}"
        advancedMounts:
          evcc:
            app:
              - path: /root/.evcc
