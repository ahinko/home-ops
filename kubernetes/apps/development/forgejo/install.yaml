---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname forgejo
  namespace: &namespace development
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: onepassword-connect
      namespace: security
    - name: postgres18
      namespace: databases
    - name: volsync
      namespace: storage
  interval: 1h
  path: "./kubernetes/apps/development/forgejo/app"
  postBuild:
    substitute:
      APP: *appname
      VOLSYNC_CAPACITY: 50Gi
      VOLSYNC_CLAIM: forgejo-data
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
