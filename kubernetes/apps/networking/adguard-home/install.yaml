---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: adguard-home-secret
  namespace: &namespace networking
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: adguard-home
  dependsOn:
    - name: onepassword-store
      namespace: security
  interval: 1h
  path: "./kubernetes/apps/networking/adguard-home/secret"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname adguard-home
  namespace: &namespace networking
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *appname
  dependsOn:
    - name: adguard-home-secret
  interval: 1h
  path: "./kubernetes/apps/networking/adguard-home/app"
  postBuild:
    substituteFrom:
      - kind: Secret
        name: adguard-home-secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
